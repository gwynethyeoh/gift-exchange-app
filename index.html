<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gift Exchange</title>
<link rel="manifest" href="manifest.json">
<style>

body{font-family:Arial;margin:0;background:#ffe6f0}

.header{background:linear-gradient(135deg,#ff2e93,#ff7ac3);color:white;text-align:center;padding:20px;font-size:24px;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,0.2)}

.eventDate{font-size:14px;margin-top:4px}

.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:14px;margin-top:20px;box-shadow:0 6px 20px rgba(255,105,180,0.25)}

input,select{padding:8px;margin:5px;border-radius:6px;border:1px solid #ffb6d9}

button{padding:8px 14px;margin:5px;background:#ff2e93;color:white;border:none;border-radius:8px;cursor:pointer}

button:hover{background:#e60073}

.designGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:15px}

.designCard{border:2px solid #ffb6d9;padding:10px;border-radius:12px;text-align:center;background:#fff0f7;cursor:pointer}

.designCard img{width:100%;height:80px;object-fit:cover;border-radius:6px}

.counter{font-size:12px;color:#d6006c;margin-top:5px}

.lowStock{color:red;font-weight:bold}

table{width:100%;margin-top:20px;border-collapse:collapse}

th{background:#ff2e93;color:white}

td,th{border:1px solid #ffd1e8;padding:8px;text-align:center}

tr:nth-child(even){background:#fff5fa}

.completed{background:#e8ffe8 !important;color:#0b7a0b;font-weight:bold}

.fab{position:fixed;bottom:25px;right:25px;background:#ff2e93;color:white;border:none;width:60px;height:60px;border-radius:50%;font-size:28px;box-shadow:0 6px 15px rgba(0,0,0,0.3);cursor:pointer}
</style>
</head>
<body>
<div class="header">

🎁 Gift Exchange
<div class="eventDate">28–29 March 2026</div>
</div>
<div class="container">

Date <select id="date"><option>28/3/2026</option><option>29/3/2026</option></select>

Name <input id="name">

Design <select id="design"></select>

Receive <input id="receive">
<button onclick="addRecord()">Add</button>
<button onclick="exportCSV()">Export Excel</button>
<br>

Search <input id="search" oninput="renderRecords()">
<h3>Design Stock</h3>
<div id="designGrid" class="designGrid"></div>
<h3>🔥 Top 5 Most Exchanged</h3>
<div id="topDesigns"></div>
<h3>Exchange Records</h3>
<table>
<thead>
<tr>
<th>Date</th><th>Name</th><th>Design</th><th>Receive</th><th>Done</th><th>Edit</th><th>Delete</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>
</div>
<button class="fab" onclick="addRecord()">+</button>
<script src="app.js"></script>
<script>

if('serviceWorker' in navigator){

  navigator.serviceWorker.register('service-worker.js').then(()=>console.log('SW registered'))

}
</script>
</body>
</html>
